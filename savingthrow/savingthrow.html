<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../assets/css/styles.css">

  <style>
    .bg-fade {
      position: relative;
      padding: 40px;
      z-index: 0;
    }

    .bg-fade::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("../assets/images/savingthrow/reaper.png");
  background-size: contain;      
  background-repeat: no-repeat;
  background-position: center;
  transform: scale(2);           
  transform-origin: center;
  opacity: 0;
  pointer-events: none;
  z-index: 0;

  animation: reaperFade 6s ease-in-out infinite;
}

   @keyframes reaperFade {
  0%   { opacity: 0; transform: scale(2.9) translateY(10px); }
  25%  { opacity: 0.18; }
  50%  { opacity: 0.28; transform: scale(3.05) translateY(-10px); }
  75%  { opacity: 0.18; }
  100% { opacity: 0; transform: scale(2.9) translateY(10px); }
}
    .blackbox-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(2, 100px);
      gap: 20px;
      padding: 50px;
      border: 2px solid #000;
    }

    .blackbox {
      width: 100px;
      height: 100px;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
    }

    .blackbox img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
  </style>
</head>

<body style="display:flex; justify-content:center; align-items:center; min-height:100vh;">

  <div class="bg-fade">
    <div class="blackbox-grid">

      <div class="blackbox"><img src="../assets/images/savingthrow/emptybox.png"></div>
      <div class="blackbox"><img src="../assets/images/savingthrow/emptybox.png"></div>
      <div class="blackbox"><img src="../assets/images/savingthrow/emptybox.png"></div>

      <div class="blackbox"><img src="../assets/images/savingthrow/emptybox.png"></div>
      <div class="blackbox"><img src="../assets/images/savingthrow/emptybox.png"></div>
      <div class="blackbox"><img src="../assets/images/savingthrow/emptybox.png"></div>

    </div>
  </div>

</body>
</html>
